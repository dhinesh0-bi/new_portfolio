<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Portfolio Message</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a14;font-family:'Segoe UI',system-ui,Arial,sans-serif;">

  <!-- Wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background-color:#0a0a14;padding:40px 16px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
          style="max-width:600px;background-color:#0f0f1a;border-radius:20px;
                 border:1px solid rgba(165,0,52,0.25);overflow:hidden;
                 box-shadow:0 20px 60px rgba(0,0,0,0.6);">

          <!-- ── TOP GRADIENT BAR ── -->
          <tr>
            <td style="height:4px;background:linear-gradient(90deg,#A50034,#005B96,#F1C40F);"></td>
          </tr>

          <!-- ── HEADER ── -->
          <tr>
            <td align="center" style="padding:36px 40px 28px;
              background:linear-gradient(135deg,rgba(165,0,52,0.12) 0%,rgba(0,91,150,0.08) 100%);">

              <!-- Logo Badge -->
              <div style="display:inline-block;width:60px;height:60px;border-radius:14px;
                background:linear-gradient(135deg,#A50034,#005B96);
                text-align:center;line-height:60px;font-size:28px;font-weight:900;
                color:#ffffff;letter-spacing:-1px;margin-bottom:16px;">
                DK
              </div>

              <h1 style="margin:0 0 6px;font-size:22px;font-weight:800;
                color:#ffffff;letter-spacing:-0.5px;">
                New Message Received
              </h1>
              <p style="margin:0;font-size:13px;color:#8899aa;letter-spacing:0.5px;
                text-transform:uppercase;font-weight:500;">
                Portfolio Contact Form
              </p>
            </td>
          </tr>

          <!-- ── DIVIDER ── -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(165,0,52,0.4),rgba(0,91,150,0.4),transparent);"></div>
            </td>
          </tr>

          <!-- ── SENDER INFO ── -->
          <tr>
            <td style="padding:28px 40px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <!-- Avatar -->
                  <td width="52" style="vertical-align:top;">
                    <div style="width:48px;height:48px;border-radius:50%;
                      background:linear-gradient(135deg,#A50034,#005B96);
                      text-align:center;line-height:48px;font-size:18px;
                      font-weight:800;color:#ffffff;">
                      {{from_name_initial}}
                    </div>
                  </td>
                  <!-- Name + Email -->
                  <td style="vertical-align:top;padding-left:14px;">
                    <div style="font-size:17px;font-weight:700;color:#ffffff;
                      letter-spacing:-0.3px;margin-bottom:4px;">
                      {{from_name}}
                    </div>
                    <div style="font-size:13px;color:#A50034;font-weight:500;">
                      {{from_email}}
                    </div>
                  </td>
                  <!-- Time badge -->
                  <td align="right" style="vertical-align:top;">
                    <span style="display:inline-block;padding:5px 12px;border-radius:20px;
                      background:rgba(241,196,15,0.1);border:1px solid rgba(241,196,15,0.25);
                      font-size:11px;color:#F1C40F;font-weight:600;letter-spacing:0.3px;">
                      {{time}}
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── SUBJECT ── -->
          <tr>
            <td style="padding:20px 40px 0;">
              <div style="padding:12px 16px;border-radius:10px;
                background:rgba(0,91,150,0.1);border:1px solid rgba(0,91,150,0.25);">
                <span style="font-size:11px;font-weight:700;color:#4DB8FF;
                  text-transform:uppercase;letter-spacing:0.8px;display:block;
                  margin-bottom:4px;">Subject</span>
                <span style="font-size:15px;font-weight:600;color:#ffffff;">
                  {{subject}}
                </span>
              </div>
            </td>
          </tr>

          <!-- ── MESSAGE BODY ── -->
          <tr>
            <td style="padding:20px 40px 0;">
              <div style="padding:20px;border-radius:12px;
                background:rgba(255,255,255,0.03);
                border:1px solid rgba(213,219,219,0.08);">
                <span style="font-size:11px;font-weight:700;color:#8899aa;
                  text-transform:uppercase;letter-spacing:0.8px;display:block;
                  margin-bottom:12px;">Message</span>
                <p style="margin:0;font-size:15px;line-height:1.75;color:#c8d0da;">
                  {{message}}
                </p>
              </div>
            </td>
          </tr>

          <!-- ── REPLY BUTTON ── -->
          <tr>
            <td align="center" style="padding:28px 40px;">
              <a href="mailto:{{from_email}}"
                style="display:inline-block;padding:13px 36px;border-radius:50px;
                  background:linear-gradient(135deg,#A50034,#CC0044);
                  color:#ffffff;text-decoration:none;font-size:15px;
                  font-weight:700;letter-spacing:0.3px;
                  box-shadow:0 4px 20px rgba(165,0,52,0.4);">
                Reply to {{from_name}} →
              </a>
            </td>
          </tr>

          <!-- ── BOTTOM DIVIDER ── -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background:rgba(213,219,219,0.07);"></div>
            </td>
          </tr>

          <!-- ── FOOTER ── -->
          <tr>
            <td align="center" style="padding:20px 40px 28px;">
              <p style="margin:0 0 6px;font-size:12px;color:#556677;">
                This message was sent via the contact form on
                <a href="https://github.com/dhinesh0-bi/new_portfolio"
                  style="color:#005B96;text-decoration:none;font-weight:600;">
                  Dhinesh K's Portfolio
                </a>
              </p>
              <p style="margin:0;font-size:11px;color:#3d4d5c;letter-spacing:0.3px;">
                © 2025 Dhinesh K &nbsp;·&nbsp; kdhinesh2005@gmail.com
              </p>
            </td>
          </tr>

          <!-- ── BOTTOM GRADIENT BAR ── -->
          <tr>
            <td style="height:3px;background:linear-gradient(90deg,#F1C40F,#F39C12,#A50034);"></td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
